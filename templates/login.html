<!DOCTYPE html>

<html>
<head>

<meta charset="UTF-8">
<title>Jivamritam – Login</title>

<link rel="stylesheet" href="/static/css/style.css">

<style>

body{
margin:0;
font-family:'Segoe UI', Arial, sans-serif;
background:#f4f7fb;
}

.header{
background:#1e3a5f;
color:white;
padding:18px;
text-align:center;
font-size:22px;
font-weight:600;
}

.login-container{
display:flex;
justify-content:center;
align-items:center;
height:85vh;
}

.login-card{
width:380px;
background:white;
border-radius:12px;
padding:35px;
box-shadow:0 8px 25px rgba(0,0,0,0.08);
text-align:center;
}

.login-card h2{
margin-bottom:20px;
color:#2c3e50;
}

input{
width:100%;
padding:12px;
margin-top:10px;
border-radius:8px;
border:1px solid #d1d9e6;
font-size:14px;
}

button{
margin-top:20px;
width:100%;
padding:12px;
background:#1e3a5f;
border:none;
border-radius:25px;
color:white;
font-weight:600;
cursor:pointer;
}

button:hover{
background:#1565c0;
}

.footer{
margin-top:20px;
font-size:13px;
color:#7a8aa0;
}

</style>

</head>

<body>

<div class="header">
Jivamritam – Digital Twin
</div>

<div class="login-container">

<div class="login-card">

<h2>System Login</h2>

<form id="loginForm">

<input type="text" id="username" placeholder="Username" required>

<input type="password" id="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>

<div class="footer">
Digital Twin Control Platform
</div>

</div>

</div>

<script>

document.getElementById("loginForm").onsubmit = async function(e){

e.preventDefault()

let username=document.getElementById("username").value
let password=document.getElementById("password").value

let res=await fetch("/login",{

method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({username,password})

})

let data=await res.json()

if(data.status=="success"){
window.location="/dashboard"
}
else{
alert("Invalid Login")
}

}

</script>

</body>
</html>
